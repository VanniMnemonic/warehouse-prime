name: Windows Portable

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      # electron-builder both BUILDS the .exe and PUBLISHES it to the
      # GitHub Release, including the `latest.yml` manifest +
      # `*.exe.blockmap` files that electron-updater needs to detect
      # new versions on installed clients. `--publish always` uploads
      # whatever the package.json `publish` config points at (github,
      # `releaseType: release` -> non-draft). Don't add a separate
      # softprops/action-gh-release step on top — it would race with
      # this one and overwrite the release without the manifest files.
      - name: Build and publish Windows portable
        run: |
          npm run build:localize
          npm run build:electron
          npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload workflow artifacts (debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: release/
