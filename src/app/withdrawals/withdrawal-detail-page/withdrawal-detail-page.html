<div class="card">
  <div class="flex items-start justify-between gap-3 mb-4 pt-6 px-6">
    <div class="flex items-center gap-3">
      <p-button icon="pi pi-arrow-left" rounded="true" severity="secondary" (onClick)="goBack()" />
      <div class="flex flex-col">
        <h2 class="text-2xl font-bold m-0">{{ pageTitle }}</h2>
        @if (pageSubtitle) {
          <span class="text-muted-color">{{ pageSubtitle }}</span>
        }
      </div>
    </div>
    @if (withdrawal && !loading) {
      <p-button
        icon="pi pi-undo"
        rounded="true"
        [outlined]="true"
        severity="secondary"
        [disabled]="!canReturn"
        (onClick)="openReturn(withdrawal)"
      />
    }
  </div>

  @if (loading) {
    <div class="p-6 text-center text-muted-color" i18n="@@loading">Loading...</div>
  } @else {
    @if (withdrawal) {
      <app-withdrawal-detail [withdrawal]="withdrawal" />
    } @else {
      <div class="p-6 text-center text-muted-color" i18n="@@withdrawalNotFound">
        Withdrawal not found.
      </div>
    }
  }
</div>

<p-dialog
  [(visible)]="returnDrawerVisible"
  header="Return Asset"
  i18n-header="@@returnAssetTooltip"
  [modal]="true"
  [dismissableMask]="true"
  [style]="{ width: '40rem' }"
  [breakpoints]="{ '960px': '75vw', '640px': '90vw' }"
>
  <ng-template pTemplate="content">
    @if (returnDrawerVisible && withdrawal) {
      <app-withdrawal-return-form
        [withdrawal]="withdrawal"
        (onSave)="onReturnSave()"
        (onCancel)="onReturnCancel()"
      />
    }
  </ng-template>
</p-dialog>
