<div class="card">
  <p-table
    #dt
    stripedRows
    size="large"
    [value]="users"
    [globalFilterFields]="['title', 'first_name', 'last_name', 'email', 'role']"
    [tableStyle]="{ 'min-width': '50rem' }"
  >
    <ng-template pTemplate="caption">
      <div class="flex">
        <p-iconfield iconPosition="left" class="ml-auto">
          <p-inputicon>
            <i class="pi pi-search"></i>
          </p-inputicon>
          <input
            pInputText
            type="text"
            [(ngModel)]="searchValue"
            (input)="dt.filterGlobal($any($event.target).value, 'contains')"
            placeholder="Search keyword"
          />
        </p-iconfield>
      </div>
    </ng-template>
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="title">Title <p-sortIcon field="title" /></th>
        <th pSortableColumn="first_name">First Name <p-sortIcon field="first_name" /></th>
        <th pSortableColumn="last_name">Last Name <p-sortIcon field="last_name" /></th>
        <th pSortableColumn="barcode">Barcode <p-sortIcon field="barcode" /></th>
        <th pSortableColumn="email">Email <p-sortIcon field="email" /></th>
        <th pSortableColumn="role">Role <p-sortIcon field="role" /></th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-user>
      <tr>
        <td>{{ user.title }}</td>
        <td>{{ user.first_name }}</td>
        <td>{{ user.last_name }}</td>
        <td>{{ user.barcode }}</td>
        <td>{{ user.email }}</td>
        <td>{{ user.role }}</td>
      </tr>
    </ng-template>
  </p-table>
</div>
