<div class="card">
  <div class="flex items-start justify-between gap-3 mb-4 pt-6 px-6">
    <div class="flex items-center gap-3">
      <p-button icon="pi pi-arrow-left" rounded="true" severity="secondary" (onClick)="goBack()" />
      <div class="flex flex-col">
        <h2 class="text-2xl font-bold m-0">{{ pageTitle }}</h2>
        @if (user?.email) {
          <span class="text-muted-color">{{ user.email }}</span>
        }
      </div>
    </div>
    @if (user && !loading) {
      <p-button
        icon="pi pi-pencil"
        rounded="true"
        [outlined]="true"
        severity="secondary"
        (onClick)="openEditUser(user)"
      />
    }
  </div>

  @if (loading) {
    <div class="p-6 text-center text-muted-color" i18n="@@loading">Loading...</div>
  } @else {
    @if (user) {
      <app-user-detail [user]="user" (onEdit)="openEditUser($event)" />
    } @else {
      <div class="p-6 text-center text-muted-color" i18n="@@userNotFound">User not found.</div>
    }
  }
</div>

<p-dialog
  [(visible)]="formDrawerVisible"
  header="Edit User"
  i18n-header="@@editUserDialogHeader"
  [modal]="true"
  [dismissableMask]="true"
  [style]="{ width: '40rem' }"
  [breakpoints]="{ '960px': '75vw', '640px': '90vw' }"
>
  <ng-template pTemplate="content">
    @if (formDrawerVisible) {
      <app-user-form [user]="editingUser" (onSave)="onFormSave()" (onCancel)="onFormCancel()" />
    }
  </ng-template>
</p-dialog>
