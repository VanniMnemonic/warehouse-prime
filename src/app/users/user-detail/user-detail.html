@if (user()) {
  <div class="flex flex-col gap-4">
    <p-toast />
    <div class="flex flex-wrap gap-6 px-6">
      <div class="flex-none">
        @if (user().image_path) {
          <p-image
            [src]="user().image_path"
            [preview]="true"
            width="240"
            class="rounded-xl overflow-hidden"
            [imageStyle]="{ 'object-fit': 'cover', height: '240px', width: '240px' }"
          />
        } @else {
          <div
            class="w-[240px] aspect-square bg-surface-100 dark:bg-surface-800 rounded-xl border border-surface-200 dark:border-surface-700 flex items-center justify-center text-muted-color"
          >
            <i class="pi pi-user text-6xl"></i>
          </div>
        }
      </div>

      <div class="flex-1 min-w-[250px] flex flex-col gap-4">
        <div class="flex flex-col">
          <span class="text-muted-color">{{ user().title?.title }}</span>
          <span class="text-xl font-bold">{{ user().first_name }} {{ user().last_name }}</span>
          <span class="text-muted-color flex items-center gap-2">
            {{ user().email }}
            <p-button
              icon="pi pi-copy"
              [text]="true"
              [rounded]="true"
              severity="secondary"
              pTooltip="Copy email"
              tooltipPosition="top"
              (onClick)="copyToClipboard(user().email)"
            />
          </span>
          <span>
            <app-location-display [location]="user().location" />
          </span>
        </div>
      </div>

      <div class="flex-1 min-w-[300px] flex flex-col">
        <div class="p-4 rounded-xl border border-surface-200 dark:border-surface-700 h-full">
          <h3 class="text-lg font-bold mb-2">Notes</h3>
          <app-notes entityType="user" [entityId]="user().id" />
        </div>
      </div>
    </div>

    <div>
      <app-withdrawals-table
        [withdrawals]="withdrawals"
        [loading]="loading"
        [showAddButton]="false"
        (onReturn)="openReturn($event)"
        (onDetails)="openDetails($event)"
      />
    </div>

    <p-dialog
      [(visible)]="returnDrawerVisible"
      header="Return Asset"
      [modal]="true"
      [dismissableMask]="true"
      [style]="{ width: '40rem' }"
      [breakpoints]="{ '960px': '75vw', '640px': '90vw' }"
    >
      <ng-template pTemplate="content">
        @if (returnDrawerVisible && selectedWithdrawal) {
          <app-withdrawal-return-form
            [withdrawal]="selectedWithdrawal"
            (onSave)="onReturnSave()"
            (onCancel)="onReturnCancel()"
          />
        }
      </ng-template>
    </p-dialog>
  </div>
}
