@if (asset()) {
  <div class="flex flex-col gap-6">
    <p-toast />

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <!-- Left Column: Image -->
      <div class="flex flex-col">
        @if (imageUrl()) {
          <p-image
            [src]="$any(imageUrl())"
            [preview]="true"
            width="100%"
            class="w-full rounded-xl overflow-hidden border border-surface-200 dark:border-surface-700 block"
            [imageStyle]="{
              width: '100%',
              height: 'auto',
              'aspect-ratio': '1/1',
              'object-fit': 'cover',
            }"
          />
        } @else {
          <div
            class="w-full aspect-square bg-surface-100 dark:bg-surface-800 rounded-xl border border-surface-200 dark:border-surface-700 flex items-center justify-center text-muted-color"
          >
            <i class="pi pi-box text-8xl"></i>
          </div>
        }
      </div>

      <!-- Right Column: Details -->
      <div class="md:col-span-2 flex flex-col gap-4">
        <div
          class="grid grid-cols-1 sm:grid-cols-2 gap-4 bg-surface-50 dark:bg-surface-900 p-4 rounded-xl border border-surface-200 dark:border-surface-700"
        >
          <div class="flex flex-col gap-1">
            <span class="text-muted-color text-sm">Part Number</span>
            <div class="flex items-center gap-2">
              <span class="font-medium text-lg">{{ asset().part_number }}</span>
              <p-button
                icon="pi pi-copy"
                [text]="true"
                [rounded]="true"
                severity="secondary"
                size="small"
                pTooltip="Copy"
                tooltipPosition="top"
                (onClick)="copyToClipboard(asset().part_number)"
              />
            </div>
          </div>
          <div class="flex flex-col gap-1">
            <span class="text-muted-color text-sm">Barcode</span>
            <div class="flex items-center gap-2">
              <span class="font-medium text-lg">{{ asset().barcode }}</span>
              <p-button
                icon="pi pi-copy"
                [text]="true"
                [rounded]="true"
                severity="secondary"
                size="small"
                pTooltip="Copy"
                tooltipPosition="top"
                (onClick)="copyToClipboard(asset().barcode)"
              />
            </div>
          </div>
        </div>
        <div class="flex flex-col">
          <p-button
            label="Edit Asset"
            icon="pi pi-pencil"
            [outlined]="true"
            severity="secondary"
            class="w-full max-w-[300px]"
            class="w-full"
            (onClick)="edit()"
          />
          <div class="flex flex-wrap gap-2 mt-2">
            <p-tag
              [value]="asset().total_quantity >= asset().min_stock ? 'In Stock' : 'Low Stock'"
              [severity]="asset().total_quantity >= asset().min_stock ? 'success' : 'danger'"
            />
            <p-tag [value]="'Total: ' + asset().total_quantity" severity="info" />
            <p-tag [value]="'Min: ' + asset().min_stock" severity="secondary" />
          </div>
        </div>
      </div>
    </div>

    <p-divider />

    <div class="-mx-6">
      <p-table
        #dt
        [value]="batches"
        [loading]="loading"
        size="large"
        stripedRows
        [globalFilterFields]="['denomination', 'serial_number', 'location.denomination']"
        class="p-datatable-sm"
      >
        <ng-template pTemplate="header">
          <tr>
            <th pSortableColumn="denomination">Batch <p-sortIcon field="denomination" /></th>
            <th pSortableColumn="serial_number">S/N <p-sortIcon field="serial_number" /></th>
            <th pSortableColumn="location.denomination">
              Location <p-sortIcon field="location.denomination" />
            </th>
            <th pSortableColumn="quantity">Qty <p-sortIcon field="quantity" /></th>
            <th pSortableColumn="expiration_date">
              Exp. Date <p-sortIcon field="expiration_date" />
            </th>
            <th style="width: 4rem"></th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-batch>
          <tr>
            <td class="font-bold">{{ batch.denomination }}</td>
            <td>{{ batch.serial_number }}</td>
            <td>
              <app-location-display [location]="batch.location" />
            </td>
            <td>{{ batch.quantity }}</td>
            <td>
              @if (batch.expiration_date) {
                <p-tag
                  [value]="(batch.expiration_date | date: 'fullDate') ?? ''"
                  [severity]="
                    isExpired(batch.expiration_date)
                      ? 'danger'
                      : isNearExpiry(batch.expiration_date)
                        ? 'warn'
                        : 'success'
                  "
                  [icon]="
                    isExpired(batch.expiration_date)
                      ? 'pi pi-exclamation-circle'
                      : isNearExpiry(batch.expiration_date)
                        ? 'pi pi-exclamation-triangle'
                        : ''
                  "
                />
              } @else {
                -
              }
            </td>
            <td class="relative">
              <p-splitButton
                label="Withdraw"
                icon="pi pi-minus-circle"
                (onClick)="onWithdrawBatch.emit(batch)"
                [model]="batchItems"
                (onDropdownClick)="setMenuBatch(batch)"
                severity="secondary"
                size="small"
                appendTo="body"
              />
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
          <tr>
            <td colspan="5" class="text-center">No batches found.</td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  </div>
}
