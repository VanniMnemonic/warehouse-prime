<div class="flex flex-col gap-6">
  <div
    class="flex items-center gap-4 p-4 border rounded-xl border-surface-200 dark:border-surface-700 bg-surface-50 dark:bg-surface-950"
  >
    <p-avatar [image]="asset().image_path" shape="square" size="xlarge" icon="pi pi-box" />
    <div class="flex flex-col">
      <span class="text-xl font-bold">{{ asset().denomination }}</span>
      <span class="text-muted-color">{{ asset().part_number }}</span>
      <span class="text-sm">Current Total: {{ asset().total_quantity }}</span>
    </div>
  </div>

  <div class="flex flex-col gap-4">
    <div class="flex flex-col gap-2">
      <label for="denomination">Batch Denomination</label>
      <input pInputText id="denomination" [(ngModel)]="denomination" class="w-full" />
    </div>

    <div class="flex flex-col gap-2">
      <label for="serialNumber">Serial Number</label>
      <input pInputText id="serialNumber" [(ngModel)]="serialNumber" class="w-full" />
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div class="flex flex-col gap-2">
        <label for="quantity">Quantity</label>
        <p-inputNumber
          id="quantity"
          [(ngModel)]="quantity"
          [min]="1"
          [showButtons]="true"
          buttonLayout="horizontal"
          spinnerMode="horizontal"
          decrementButtonClass="p-button-secondary"
          incrementButtonClass="p-button-secondary"
          incrementButtonIcon="pi pi-plus"
          decrementButtonIcon="pi pi-minus"
          class="w-full"
        />
      </div>
      <div class="flex flex-col gap-2">
        <label for="expirationDate">Expiration Date</label>
        <p-datepicker
          id="expirationDate"
          [(ngModel)]="expirationDate"
          [showIcon]="true"
          dateFormat="yy-mm-dd"
          class="w-full"
        />
      </div>
    </div>

    <div class="flex flex-col gap-1 w-full">
      <label for="location" class="font-bold">Location</label>
      <p-treeSelect
        id="location"
        [(ngModel)]="selectedLocation"
        [options]="locations"
        placeholder="Select a Location"
        [filter]="true"
        filterBy="label"
        class="w-full"
        selectionMode="single"
        appendTo="body"
      />
    </div>
  </div>

  <div class="flex pt-4 justify-end gap-2">
    <p-button
      label="Cancel"
      icon="pi pi-times"
      (onClick)="cancel()"
      severity="secondary"
      [disabled]="loading"
    />
    <p-button
      [label]="batch() ? 'Update Batch' : 'Create Batch'"
      icon="pi pi-check"
      (onClick)="submit()"
      [loading]="loading"
    />
  </div>
</div>
