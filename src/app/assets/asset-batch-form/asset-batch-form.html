<div class="flex flex-col gap-6">
  <div
    class="flex items-center gap-4 p-4 border rounded-xl border-surface-200 dark:border-surface-700 bg-surface-50 dark:bg-surface-950"
  >
    <p-avatar [image]="asset().image_path" shape="square" size="xlarge" icon="pi pi-box" />
    <div class="flex flex-col">
      <span class="text-xl font-bold">{{ asset().denomination }}</span>
      <span class="text-muted-color">{{ asset().part_number }}</span>
      <span class="text-sm" i18n="@@batchFormCurrentTotalLabel">Current Total: {{ asset().total_quantity }}</span>
    </div>
  </div>

  <div class="flex flex-col gap-4">
    <div class="flex flex-col gap-2">
      <label for="denomination" i18n="@@batchFormDenominationLabel">Batch Denomination</label>
      <input pInputText id="denomination" [(ngModel)]="denomination" class="w-full" />
    </div>

    <div class="flex flex-col gap-2">
      <label for="serialNumber" i18n="@@batchFormSerialNumberLabel">Serial Number</label>
      <input pInputText id="serialNumber" [(ngModel)]="serialNumber" class="w-full" />
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div class="flex flex-col gap-2">
        <label for="quantity" i18n="@@batchFormQuantityLabel">Quantity</label>
        <p-inputNumber
          id="quantity"
          [(ngModel)]="quantity"
          [min]="1"
          [showButtons]="true"
          buttonLayout="horizontal"
          spinnerMode="horizontal"
          decrementButtonClass="p-button-secondary"
          incrementButtonClass="p-button-secondary"
          incrementButtonIcon="pi pi-plus"
          decrementButtonIcon="pi pi-minus"
          class="w-full"
        />
      </div>
      <div class="flex flex-col gap-2">
        <label for="expirationDate" i18n="@@batchFormExpirationDateLabel">Expiration Date</label>
        <p-datepicker
          id="expirationDate"
          [(ngModel)]="expirationDate"
          [showIcon]="true"
          dateFormat="yy-mm-dd"
          appendTo="body"
          class="w-full"
        />
      </div>
    </div>

    <div class="flex flex-col gap-1 w-full">
      <label for="location" class="font-bold" i18n="@@batchFormLocationLabel">Location</label>
      <p-treeSelect
        id="location"
        [(ngModel)]="selectedLocation"
        [options]="locations"
        placeholder="Select a Location"
        i18n-placeholder="@@batchFormLocationPlaceholder"
        [filter]="true"
        filterBy="label"
        class="w-full"
        selectionMode="single"
        appendTo="body"
      />
    </div>
  </div>

  <div class="flex pt-4 justify-end gap-2">
    <p-button
      label="Cancel"
      i18n-label="@@cancelButton"
      icon="pi pi-times"
      (onClick)="cancel()"
      severity="secondary"
      [disabled]="loading"
    />
    @if (batch()) {
      <p-button
        label="Update Batch"
        i18n-label="@@batchFormUpdateButton"
        icon="pi pi-check"
        (onClick)="submit()"
        [loading]="loading"
      />
    } @else {
      <p-button
        label="Create Batch"
        i18n-label="@@batchFormCreateButton"
        icon="pi pi-check"
        (onClick)="submit()"
        [loading]="loading"
      />
    }
  </div>
</div>
