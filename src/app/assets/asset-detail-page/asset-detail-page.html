<div class="card">
  <div class="flex items-start justify-between gap-3 mb-4 pt-6 px-6">
    <div class="flex items-center gap-3">
      <p-button icon="pi pi-arrow-left" rounded="true" severity="secondary" (onClick)="goBack()" />
      <div class="flex flex-col">
        <h2 class="text-2xl font-bold m-0">{{ pageTitle }}</h2>
        @if (asset?.part_number) {
          <span class="text-muted-color">{{ asset.part_number }}</span>
        }
      </div>
    </div>
    @if (asset && !loading) {
      <div class="flex items-center gap-2">
        <p-button
          icon="pi pi-pencil"
          rounded="true"
          [outlined]="true"
          severity="secondary"
          (onClick)="openEditAsset(asset)"
          pTooltip="Edit asset"
          i18n-pTooltip="@@assetEditTooltip"
          tooltipPosition="bottom"
        />
        <p-button
          icon="pi pi-trash"
          rounded="true"
          [outlined]="true"
          severity="danger"
          (onClick)="confirmDeleteAsset(asset)"
          pTooltip="Delete asset"
          i18n-pTooltip="@@assetDeleteTooltip"
          tooltipPosition="bottom"
        />
      </div>
    }
  </div>

  @if (loading) {
    <div class="p-6 text-center text-muted-color" i18n="@@loading">Loading...</div>
  } @else {
    @if (asset) {
      <app-asset-detail
        [asset]="asset"
        (onEdit)="openEditAsset($event)"
        (onEditBatch)="openEditBatch($event)"
        (onWithdrawBatch)="withdrawBatch($event)"
      />
    } @else {
      <div class="p-6 text-center text-muted-color" i18n="@@assetNotFound">Asset not found.</div>
    }
  }
</div>

<p-dialog
  [(visible)]="formDrawerVisible"
  header="Edit Asset"
  i18n-header="@@editAssetDialogHeader"
  [modal]="true"
  [dismissableMask]="true"
  [style]="{ width: '40rem' }"
  [breakpoints]="{ '960px': '75vw', '640px': '90vw' }"
>
  <ng-template pTemplate="content">
    @if (formDrawerVisible) {
      <app-asset-form [asset]="editingAsset" (onSave)="onFormSave()" (onCancel)="onFormCancel()" />
    }
  </ng-template>
</p-dialog>

<p-dialog
  [(visible)]="batchFormDrawerVisible"
  [header]="batchDialogHeader"
  [modal]="true"
  [dismissableMask]="true"
  [style]="{ width: '40rem' }"
  [breakpoints]="{ '960px': '75vw', '640px': '90vw' }"
>
  <ng-template pTemplate="content">
    @if (batchFormDrawerVisible && asset) {
      <app-asset-batch-form
        [asset]="asset"
        [batch]="selectedBatch"
        (onSave)="onBatchFormSave()"
        (onCancel)="batchFormDrawerVisible = false"
      />
    }
  </ng-template>
</p-dialog>

<p-dialog
  [(visible)]="withdrawFormDrawerVisible"
  header="Add Withdrawal"
  [modal]="true"
  [dismissableMask]="true"
  [style]="{ width: '55rem' }"
  [breakpoints]="{ '960px': '75vw', '640px': '90vw' }"
>
  <ng-template pTemplate="content">
    @if (withdrawFormDrawerVisible) {
      <app-withdrawal-form
        [preselectedBatch]="selectedBatchForWithdrawal"
        (onSave)="onWithdrawFormSave($event)"
        (onCancel)="onWithdrawFormCancel()"
      />
    }
  </ng-template>
</p-dialog>

<p-confirmDialog />
<p-toast />
