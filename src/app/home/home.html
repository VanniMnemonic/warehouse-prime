<div class="card">
  <div class="bg-surface-0 dark:bg-surface-900 text-primary p-4 rounded-t-lg">
    <h1 class="text-4xl font-bold m-0" i18n="@@appTitle">Warehouse Prime</h1>
  </div>
  <p-tabs [value]="activeTab">
    <p-tablist>
      @for (tab of tabs; track tab.route) {
        <p-tab
          [value]="tab.route"
          [routerLink]="tab.route"
          class="flex items-center !gap-2 text-inherit"
        >
          <i [class]="tab.icon"></i>
          <span>{{ tab.label }}</span>
        </p-tab>
      }
    </p-tablist>
  </p-tabs>
  <div class="route-container">
    <div [@routeAnimations]="prepareRoute(outlet)" class="route-viewport">
      <router-outlet #outlet="outlet"></router-outlet>
    </div>
  </div>
</div>
